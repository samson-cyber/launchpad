<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>New Tab</title>
  <link rel="stylesheet" href="newtab.css">
</head>
<body>
  <div id="search-section">
    <form id="search-form" action="https://www.google.com/search" method="GET" autocomplete="off">
      <div id="search-bar">
        <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#9aa0a6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" name="q" id="search-input" placeholder="Search Google or type a URL" autofocus>
      </div>
    </form>
  </div>

  <main id="content">
    <div id="welcome-screen" class="hidden">
      <div id="welcome-card">
        <h1 id="welcome-title">Welcome to LaunchPad</h1>
        <p id="welcome-subtitle">Your new tab, organized your way.</p>
        <div id="welcome-actions">
          <button id="welcome-import" type="button" class="welcome-btn welcome-btn-primary">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
            </svg>
            Import from Chrome Bookmarks
          </button>
          <button id="welcome-scratch" type="button" class="welcome-btn welcome-btn-secondary">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            Start from scratch
          </button>
        </div>
      </div>
    </div>

    <div id="groups"></div>
    <button id="add-group-btn" type="button">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      Add group
    </button>
  </main>

  <div id="shortcut-menu" class="hidden">
    <button id="menu-edit" class="menu-item" type="button">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
      </svg>
      Edit shortcut
    </button>
    <button id="menu-remove" class="menu-item" type="button">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
        <path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
      </svg>
      Remove
    </button>
  </div>

  <div id="modal-overlay" class="hidden">
    <div id="modal">
      <div id="modal-header">
        <h2 id="modal-title">Add shortcut</h2>
      </div>
      <div id="modal-body">
        <label for="modal-name">Name</label>
        <input type="text" id="modal-name" autocomplete="off">
        <label for="modal-url">URL</label>
        <input type="text" id="modal-url" placeholder="https://" autocomplete="off">
      </div>
      <div id="modal-footer">
        <button id="modal-cancel" type="button">Cancel</button>
        <button id="modal-save" type="button">Done</button>
      </div>
    </div>
  </div>

  <div id="bookmark-overlay" class="hidden">
    <div id="bookmark-modal">
      <div id="bookmark-modal-header">
        <h2>Import Bookmarks</h2>
        <p>Select folders to import as shortcut groups.</p>
      </div>
      <div id="bookmark-modal-body">
        <div id="bookmark-toolbar">
          <button id="bookmark-select-all" type="button">Select all / none</button>
        </div>
        <div id="bookmark-folder-list"></div>
      </div>
      <div id="bookmark-modal-footer">
        <button id="bookmark-cancel" type="button">Cancel</button>
        <button id="bookmark-import-btn" type="button">Import</button>
      </div>
    </div>
  </div>

  <button id="settings-btn" type="button" title="Settings">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
    </svg>
  </button>
  <div id="settings-menu" class="hidden">
    <button id="settings-import" class="menu-item" type="button">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
      </svg>
      Import Bookmarks
    </button>
  </div>

  <button id="theme-toggle" type="button" title="Toggle dark mode"></button>

  <script src="storage.js"></script>
  <script src="bookmarks.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
  <script src="newtab.js"></script>
</body>
</html>
