<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>New Tab</title>
  <link rel="stylesheet" href="newtab.css">
</head>
<body>
  <div id="search-section">
    <div id="brand-logo" draggable="false">
      <svg class="brand-icon" width="28" height="28" viewBox="0 0 24 24" fill="none">
        <circle cx="7" cy="7" r="3" fill="#4285F4"/><circle cx="17" cy="7" r="3" fill="#EA4335"/>
        <circle cx="7" cy="17" r="3" fill="#34A853"/><circle cx="17" cy="17" r="3" fill="#FBBC05"/>
      </svg>
      <span class="brand-text">LaunchPad</span>
    </div>
    <form id="search-form" action="https://www.google.com/search" method="GET" autocomplete="off">
      <div id="search-bar">
        <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#9aa0a6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" name="q" id="search-input" placeholder="Search the web or type a URL" autofocus>
      </div>
    </form>
  </div>

  <main id="content">
    <div id="groups"></div>
    <button id="add-group-btn" type="button">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      Add group
    </button>
  </main>

  <section id="recently-closed" class="hidden">
    <div id="recently-closed-inner">
      <div class="rc-toolbar">
        <button id="rc-filter-btn" type="button">
          <span id="rc-filter-label">Recently closed</span>
          <svg class="rc-chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </button>
        <div id="rc-filter-menu" class="hidden">
          <button class="rc-filter-option" data-filter="recent" type="button">Recent</button>
          <button class="rc-filter-option" data-filter="today" type="button">Today</button>
          <button class="rc-filter-option" data-filter="yesterday" type="button">Yesterday</button>
          <button class="rc-filter-option" data-filter="week" type="button">Last 7 days</button>
          <button class="rc-filter-option" data-filter="custom" type="button">Custom range...</button>
        </div>
        <div id="rc-date-picker" class="hidden">
          <input type="date" id="rc-date-start">
          <span class="rc-date-sep">&ndash;</span>
          <input type="date" id="rc-date-end">
          <button id="rc-date-apply" type="button">Go</button>
        </div>
        <button id="rc-dismiss" type="button" title="Hide for this session">&times;</button>
      </div>
      <div id="rc-scroll-wrapper">
        <div id="recently-closed-list"></div>
      </div>
    </div>
  </section>

  <div id="first-run-toast" class="hidden">
    <span>LaunchPad is ready! <a id="toast-import" href="#">Import your Chrome bookmarks</a> or start adding shortcuts.</span>
    <button id="toast-dismiss" type="button" title="Dismiss">&times;</button>
  </div>

  <div id="shortcut-menu" class="hidden">
    <button id="menu-edit" class="menu-item" type="button">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
      </svg>
      Edit shortcut
    </button>
    <button id="menu-remove" class="menu-item" type="button">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
        <path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
      </svg>
      Remove
    </button>
  </div>

  <div id="modal-overlay" class="hidden">
    <div id="modal">
      <div id="modal-header">
        <h2 id="modal-title">Add shortcut</h2>
      </div>
      <div id="modal-body">
        <label for="modal-name">Name</label>
        <input type="text" id="modal-name" autocomplete="off">
        <label for="modal-url">URL</label>
        <input type="text" id="modal-url" placeholder="https://" autocomplete="off">
      </div>
      <div id="modal-divider"></div>
      <div id="modal-import-link">
        <a id="modal-import-bookmarks" href="#">or Import from Chrome Bookmarks</a>
      </div>
      <div id="modal-footer">
        <button id="modal-cancel" type="button">Cancel</button>
        <button id="modal-save" type="button">Done</button>
      </div>
    </div>
  </div>

  <div id="bookmark-overlay" class="hidden">
    <div id="bookmark-modal">
      <div id="bookmark-modal-header">
        <h2>Import Bookmarks</h2>
        <p>Select folders to import as shortcut groups.</p>
      </div>
      <div id="bookmark-modal-body">
        <div id="bookmark-toolbar">
          <button id="bookmark-select-all" type="button">Select all / none</button>
        </div>
        <div id="bookmark-folder-list"></div>
      </div>
      <div id="bookmark-modal-footer">
        <button id="bookmark-cancel" type="button">Cancel</button>
        <button id="bookmark-import-btn" type="button">Import</button>
      </div>
    </div>
  </div>

  <div id="bg-overlay" class="hidden">
    <div id="bg-modal">
      <div id="bg-modal-header">
        <h2>Change Background</h2>
      </div>
      <div id="bg-modal-body">
        <button id="bg-upload-btn" class="bg-option" type="button">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
          Upload image
        </button>
        <input type="file" id="bg-file-input" accept="image/*" class="hidden">
        <div id="bg-url-row">
          <input type="text" id="bg-url-input" placeholder="Paste image URL..." autocomplete="off">
          <button id="bg-url-apply" type="button">Apply</button>
        </div>
        <div id="bg-error" class="hidden"></div>
      </div>
      <div id="bg-modal-footer">
        <button id="bg-remove" type="button">Remove background</button>
        <button id="bg-cancel" type="button">Cancel</button>
      </div>
    </div>
  </div>

  <div id="bottom-controls">
    <button id="settings-btn" type="button" title="Settings">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
    <button id="wallpaper-btn" type="button" title="Change background">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>
      </svg>
    </button>
    <button id="theme-toggle" type="button" title="Toggle dark mode"></button>
  </div>
  <div id="settings-menu" class="hidden">
    <button id="settings-import" class="menu-item" type="button">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
      </svg>
      Import Bookmarks
    </button>
  </div>

  <script src="storage.js"></script>
  <script src="bookmarks.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
  <script src="newtab.js"></script>
</body>
</html>
